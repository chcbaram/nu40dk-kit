# LOG
#
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

CONFIG_CONSOLE_SUBSYS=y
CONFIG_CONSOLE_GETCHAR=y
CONFIG_CONSOLE_GETCHAR_BUFSIZE=64
CONFIG_CONSOLE_PUTCHAR_BUFSIZE=512

CONFIG_LOG=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_LOG_PRINTK=y
CONFIG_LOG_DEFAULT_LEVEL=3


CONFIG_GPIO=y
CONFIG_I2C=y
CONFIG_I2S=y
CONFIG_SPI=y
CONFIG_INPUT=y

CONFIG_CMSIS_DSP=y
CONFIG_CMSIS_DSP_TRANSFORM=y
CONFIG_REQUIRES_FULL_LIBC=y

CONFIG_MAIN_STACK_SIZE=8192


# SDCARD 
#
CONFIG_SDHC=y
CONFIG_DISK_ACCESS=y
CONFIG_DISK_DRIVER_SDMMC=y
CONFIG_SD_DATA_TIMEOUT=100
CONFIG_SD_RETRY_COUNT=5


# FILE SYSTEM
#
CONFIG_FILE_SYSTEM=y
CONFIG_FAT_FILESYSTEM_ELM=y
CONFIG_FS_FATFS_LFN=y
CONFIG_FS_FATFS_LFN_MODE_STACK=y
CONFIG_FS_FATFS_REENTRANT=y


# AUDIO
#
CONFIG_AUDIO=y
CONFIG_AUDIO_DMIC=y


# USB CDC
#
CONFIG_USB_DEVICE_STACK_NEXT=y
CONFIG_CDC_ACM_SERIAL_INITIALIZE_AT_BOOT=n
CONFIG_UART_LINE_CTRL=y
CONFIG_USBD_CDC_ACM_CLASS=y
CONFIG_USBD_CDC_ACM_LOG_LEVEL_OFF=y
CONFIG_USBD_LOG_LEVEL_WRN=n
CONFIG_USBD_LOG_LEVEL_ERR=y
CONFIG_UDC_DRIVER_LOG_LEVEL_WRN=n
CONFIG_UDC_DRIVER_LOG_LEVEL_ERR=y


# WS2812
#
CONFIG_SPI=y
CONFIG_LED_STRIP=y
CONFIG_WS2812_STRIP_SPI=y


# BLUETOOTH
#
CONFIG_BT=y
CONFIG_BT_CENTRAL=y
CONFIG_BT_SCAN=y
CONFIG_BT_SCAN_FILTER_ENABLE=y
CONFIG_BT_SCAN_UUID_CNT=8
CONFIG_BT_SCAN_NAME_CNT=8
CONFIG_BT_SCAN_APPEARANCE_CNT=8
CONFIG_BT_MAX_CONN=2

CONFIG_BT_SMP=y
CONFIG_BT_L2CAP_DYNAMIC_CHANNEL=y

CONFIG_BT_CTLR_CRYPTO=y
CONFIG_BT_BONDABLE=y
CONFIG_BT_SETTINGS=y
# CONFIG_BT_FIXED_PASSKEY=n
CONFIG_BT_PRIVACY=y
# CONFIG_BT_SIGNING=y
CONFIG_BT_GATT_CLIENT=y
CONFIG_BT_GATT_DM=y
CONFIG_BT_GATT_AUTO_DISCOVER_CCC=y
CONFIG_BT_RX_STACK_SIZE=8192
CONFIG_THREAD_NAME=y
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=8192

CONFIG_BT_MAX_CONN=2
CONFIG_BT_MAX_PAIRED=5

CONFIG_NVS=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y
CONFIG_SETTINGS_RUNTIME=n
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y

CONFIG_BT_L2CAP_TX_MTU=247
CONFIG_BT_BUF_ACL_RX_SIZE=251
CONFIG_BT_BUF_ACL_TX_SIZE=251
CONFIG_BT_BUF_CMD_TX_SIZE=251


# 디버그 로그 활성화
CONFIG_BT_LOG_LEVEL_INF=y
CONFIG_BT_SCAN_LOG_LEVEL_INF=y
CONFIG_SETTINGS_LOG_LEVEL_DBG=y

CONFIG_NRF_ENABLE_ICACHE=y
CONFIG_BT_CONN_TX_MAX=8

# L2CAP 및 ACL 버퍼 확장 (동시 대량 구독 요청 처리용)
# CONFIG_BT_L2CAP_TX_BUF_COUNT=10
# CONFIG_BT_BUF_ACL_TX_COUNT=10
# CONFIG_BT_CONN_TX_MAX=10

# # 🔥 [빌드 에러 해결] 수신 이벤트 버퍼를 송신 버퍼(10)보다 크게 설정
# CONFIG_BT_BUF_EVT_RX_COUNT=15

# # NCS 최신 버전에서 GATT/ATT 버퍼 부족(err -12)을 해결하는 핵심 옵션들
# CONFIG_BT_ATT_PREPARE_COUNT=5

# 💡 [핵심: 빌드 에러 해결 및 L3 보안 활성화]
# 암호화 엔진으로 PSA(Platform Security Architecture) Crypto 라이브러리를 강제합니다.
# 이 옵션들이 조합되면 Zephyr 내부에서 암호화 연산에 필요한 BT_ECC를 알아서 자동으로 켭니다.
# CONFIG_BT_SMP_SC_ONLY=y

# SDC 컨트롤러의 기본 한계(3개)에 맞추어 호스트 TX 버퍼를 3~4개 수준으로 안전하게 조율합니다.
CONFIG_BT_L2CAP_TX_BUF_COUNT=4
CONFIG_BT_BUF_ACL_TX_COUNT=3
CONFIG_BT_CONN_TX_MAX=3
CONFIG_BT_BUF_EVT_RX_COUNT=10

# GATT / ATT 동시 다발적 응답(err -12) 처리를 위한 내부 큐 확장
CONFIG_BT_ATT_PREPARE_COUNT=5


# --- [2] 페어링 및 키 저장을 위한 SMP 필수 옵션 (보안 협상용) ---
CONFIG_BT_SMP=y
CONFIG_BT_BONDABLE=y
CONFIG_BT_SETTINGS=y
CONFIG_SETTINGS=y